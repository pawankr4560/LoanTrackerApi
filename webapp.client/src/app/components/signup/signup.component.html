<div class="signup-container">
    <h2>Signup</h2>
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email:</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-control"
          placeholder="Enter your email"
        />
        <small *ngIf="signupForm.get('email')?.touched && signupForm.get('email')?.invalid" class="error">
          Email is required and must be valid.
        </small>
      </div>
  
      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password:</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="form-control"
          placeholder="Enter your password"
        />
        <small *ngIf="signupForm.get('password')?.touched && signupForm.get('password')?.invalid" class="error">
          Password is required and must have at least 6 characters.
        </small>
      </div>
  
      <div class="form-group">
        <label for="confirmPassword">Confirm Password:</label>
        <input
          id="confirmPassword"
          type="password"
          formControlName="confirmPassword"
          class="form-control"
          placeholder="Confirm your password"
        />
        <small *ngIf="signupForm.errors?.['passwordMismatch'] && signupForm.get('confirmPassword')?.touched" class="error">
          Passwords must match.
        </small>
      </div>
  
      <!-- First Name Field -->
      <div class="form-group">
        <label for="firstName">First Name:</label>
        <input
          id="firstName"
          type="text"
          formControlName="firstName"
          class="form-control"
          placeholder="Enter your first name"
        />
        <small *ngIf="signupForm.get('firstName')?.touched && signupForm.get('firstName')?.invalid" class="error">
          First name is required.
        </small>
      </div>
  
      <!-- Last Name Field -->
      <div class="form-group">
        <label for="lastName">Last Name:</label>
        <input
          id="lastName"
          type="text"
          formControlName="lastName"
          class="form-control"
          placeholder="Enter your last name"
        />
        <small *ngIf="signupForm.get('lastName')?.touched && signupForm.get('lastName')?.invalid" class="error">
          Last name is required.
        </small>
      </div>
  
      <!-- Gender Field -->
      <div class="form-group">
        <label for="gender">Gender:</label>
        <select id="gender" formControlName="gender" class="form-control">
          <option value="" disabled>Select your gender</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="other">Other</option>
        </select>
        <small *ngIf="signupForm.get('gender')?.touched && signupForm.get('gender')?.invalid" class="error">
          Gender is required.
        </small>
      </div>
  
      <!-- Mobile Field -->
      <div class="form-group">
        <label for="mobile">Phone:</label>
        <input
          id="mobile"
          type="text"
          formControlName="phone"
          class="form-control"
          placeholder="Enter your mobile number"
        />
        <small *ngIf="signupForm.get('phone')?.touched && signupForm.get('phone')?.invalid" class="error">
          Mobile is required and must be a valid number.
        </small>
      </div>

        <!-- Search Bar for Address -->
    <div class="form-group">
      <label for="searchAddress">Search Address:</label>
      <input
      id="searchAddress"
      type="text"
      placeholder="Search for an address"
      #autocompleteInput
      class="form-control"
      (input)="getAddress($event.target)" 
    />
    </div>

     <!-- Suggestions List -->
     <div *ngIf="suggestions.length > 0" class="suggestions-container">
      <ul class="list-group" style="cursor: pointer;">
        <li *ngFor="let suggestion of suggestions" 
            class="list-group-item"
            (click)="selectAddress(suggestion)">
          {{ suggestion }}
        </li>
      </ul>
    </div>
  
      <!-- Address Field -->
      <div class="form-group">
        <label for="address">Address:</label>
        <textarea
          id="address"
          formControlName="address"
          class="form-control"
          placeholder="Enter your address"
        ></textarea>
        <small *ngIf="signupForm.get('address')?.touched && signupForm.get('address')?.invalid" class="error">
          Address is required.
        </small>
      </div>
  
      <!-- Submit Button -->
      <button type="submit" [disabled]="signupForm.invalid" class="btn btn-primary">
        Signup
      </button>
    </form>
  </div>
  <p-toast></p-toast>
