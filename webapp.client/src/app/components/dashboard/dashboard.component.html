<p-table [value]="users"   [paginator]="true"
[rows]="5"
[tableStyle]="{ 'min-width': '50rem' }"
[rowsPerPageOptions]="[5, 10, 20]">
    <ng-template #header>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Gender</th>
            <th>LoginCount</th>
        </tr>
    </ng-template>
    <ng-template #body let-user>
        <tr>
            <td>{{ user.firstName + user.lastName }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.gender }}</td>
            <td>{{ user.loginCount }}</td>
        </tr>
    </ng-template>
</p-table>
