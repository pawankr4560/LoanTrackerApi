<div class="login-container">
    <h2>Login</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Email:</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="form-control"
          placeholder="Enter your email"
        />
        <small *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="error">
          Email is required and must be valid.
        </small>
      </div>
  
      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Password:</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="form-control"
          placeholder="Enter your password"
        />
        <small *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="error">
          Password is required.
        </small>
      </div>
  
      <!-- Login Button -->
      <button type="submit" [disabled]="loginForm.invalid" class="btn btn-primary">
        Login
      </button>
      
      <!-- SignUp Button -->
      <br><br>
      <button type="button" class="btn btn-success" (click)="onSignUp()">
        SignUp
      </button>
    </form>
  
    <!-- Error Message -->
    <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>
  </div>

  <div class="login-card">
    <asl-google-signin-button 
      type="standard" 
      size="medium" 
      shape="pill"
      text="continue_with"
      theme="outline"
      logo_alignment="center"
      class="google-signin-btn">
    </asl-google-signin-button>
  </div>
  
  
<p-progressSpinner styleClass="w-4rem h-4rem" strokeWidth="5" fill="var(--surface-ground)" animationDuration=".5s" *ngIf="loading"></p-progressSpinner>

  <p-toast></p-toast>
